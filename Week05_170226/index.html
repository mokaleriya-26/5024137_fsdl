<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediCare Plus - Patient Portal</title>

<link rel="stylesheet" href="style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm">
<div class="container">
<a class="navbar-brand fw-bold text-primary" href="#">MediCare Plus</a>
</div>
</nav>

<!-- HERO SECTION -->
<section class="hero text-center">
<div class="container">
<h1>Your Health, Our Priority</h1>
<p>Register online and connect with expert doctors instantly.</p>
</div>
</section>

<!-- REGISTRATION FORM -->
<section class="container my-5">
<div class="row justify-content-center">
<div class="col-md-6">

<div class="card shadow p-4">
<h3 class="text-center text-primary mb-3">Patient Registration</h3>

<form id="registerForm">

<div class="mb-3">
<label>Name</label>
<input type="text" id="name" class="form-control">
<small class="error" id="nameError"></small>
</div>

<div class="mb-3">
<label>Email</label>
<input type="text" id="email" class="form-control">
<small class="error" id="emailError"></small>
</div>

<div class="mb-3">
<label>Age</label>
<input type="number" id="age" class="form-control">
<small class="error" id="ageError"></small>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" id="password" class="form-control">
<small class="error" id="passwordError"></small>
</div>

<div class="mb-3">
<label>Department</label>
<select id="department" class="form-select">
<option value="">Select Department</option>
<option>General Medicine</option>
<option>Cardiology</option>
<option>Orthopedics</option>
<option>Pediatrics</option>
</select>
<small class="error" id="departmentError"></small>
</div>

<button class="btn btn-primary w-100" type="submit">Register</button>

<p id="successMsg"></p>

</form>
</div>

</div>
</div>
</section>

<footer class="text-center p-3">
© 2026 MediCare Plus | Patient Portal Prototype
</footer>

<script src="script.js"></script>
</body>
</html>
