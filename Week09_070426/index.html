<!DOCTYPE html>
<html lang="en" ng-app="myApp">
<head>
    <meta charset="UTF-8">
    <title>AngularJS Hello App</title>

    <!-- AngularJS CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        input {
            padding: 10px;
            width: 90%;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 10px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background: #4facfe;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }

        h2 {
            margin-top: 20px;
            color: #333;
        }

        .count {
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="card" ng-controller="MyController">

    <h1>👋 Welcome</h1>

    <!-- Input with ng-model -->
    <input type="text" ng-model="name" placeholder="Enter your name">

    <!-- Expression + real-time length -->
    <p class="count">Characters: {{ name.length || 0 }}</p>

    <!-- Button using ng-click -->
    <button ng-click="sayHello()">Greet Me</button>

    <!-- Expression output -->
    <h2>{{ message }}</h2>

</div>

<script>
    var app = angular.module("myApp", []);

    app.controller("MyController", function($scope) {

        $scope.name = "";
        $scope.message = "Your greeting will appear here";

        $scope.sayHello = function() {
            if ($scope.name) {
                $scope.message = "Hello, " + $scope.name + " 🎉";
            } else {
                $scope.message = "Hello, Guest 😄";
            }
        };

    });
</script>

</body>
</html>
